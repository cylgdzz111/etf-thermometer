services:
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DB_URL=mysql+aiomysql://etf:${DB_PASSWORD}@db:3306/etf_thermometer
      - DB_ECHO=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: etf_thermometer
      MYSQL_USER: etf
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m scripts.fetch_daily
    environment:
      - DB_URL=mysql+aiomysql://etf:${DB_PASSWORD}@db:3306/etf_thermometer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
